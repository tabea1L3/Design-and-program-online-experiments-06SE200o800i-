<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- step 0:  Load the jsPsych library and plugins -->
    <script src="https://unpkg.com/jspsych@8.2.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@2.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-canvas-keyboard-response@2.1.0"></script>
    <link href="https://unpkg.com/jspsych@8.2.3/css/jspsych.css" rel="stylesheet" type="text/css" >

    <title>Session 7</title>
</head>
<body>
        //Step 1: add script for experiment
  

        // step 2: initiate jsPsych instance and assign to a variable 


        //Step 3:  build your timeline
 


        //Step 4: run your jsPsych

        <script>
            const jsPsych = initJsPsych();

            const timeline = [];

            const fixation ={
                type: jsPsychHtmlKeyboardResponse,
                stimulus: "<h2>+<h2>",
                choices: "NO_KEYS",
                trial_duration: 1000    
            }

            // timeline.push(fixation);

            function canvasFun(canvas){

                const ctx = canvas.getContext("2d");
                console.dir(ctx);
                ctx.fillStyle = "pink";
                ctx.fillRect(window.innerWidth/2,window.innerHeight/2,100,100)

                ctx.strokeRect(window.innerWidth/2,window.innerHeight/2,100,100);

                ctx.clearRect(window.innerWidth/2,window.innerHeight/2,10,10)

                ctx.beginPath();
                ctx.moveTo(500,500);
                ctx.lineTo(500-250,500+250);
                ctx.lineTo(500+250,500+250);
                ctx.closePath();
                ctx.fillStyle = "lightgreen";
                ctx.fill();
                ctx.strokeStyle = "green"
                ctx.stroke();


                ctx.beginPath();
                ctx.arc(window.innerWidth/2,window.innerHeight/2, 50, 0, Math.PI);
                ctx.fillStyle = "yellow";
                ctx.fill();
                ctx.closePath();

                ctx.beginPath();
                ctx.ellipse(200,200, 50, 80,Math.PI/4 , 0, 2*Math.PI);
                ctx.fillStyle ="blue";
                ctx.fill();




            }

            const draw = {
                type: jsPsychCanvasKeyboardResponse,
                canvas_size: [window.innerWidth,window.innerHeight],
                stimulus: canvasFun,//canvas function here,
                choices: " "
            }
            timeline.push(draw);

            jsPsych.run(timeline);



        </script> 


</body>
</html>
