<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- step 0:  Load the jsPsych library and plugins -->
    <script src="https://unpkg.com/jspsych@8.2.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@2.1.0"></script>
    <script src="https://unpkg.com/@jspsych/plugin-canvas-keyboard-response@2.1.0"></script>
    <link href="https://unpkg.com/jspsych@8.2.3/css/jspsych.css" rel="stylesheet" type="text/css" >

    <title>Session 7</title>
</head>
<body>
        //Step 1: add script for experiment 
        <script>  // doing it internally, since no js file created
        const jsPsych = initJsPsych();
        const timeline = [];

        const fixation = {
            type: jsPsychHtmlKeyboardResponse, //set type of trial
            stimulus: "<h1>+</h1>",
            choices: "NO_KEYS",
            trial_duration: 1000
        }

        timeline.push(fixation);

        function drawFN(canvas){
            const ctx = canvas.getContext("2d");
            console.dir(ctx);
            ctx.fillStyle="pink";
            ctx.fillRect(500, 500, 100, 50); //place, place, width, height
            ctx.strokeStyle = "red";
            ctx.strokeRect(500, 500, 100, 50);
            ctx.clearRect(550, 550, 10, 10);

        }

        const canvasTrial = {
            type: jsPsychCanvasKeyboardResponse,
            canvas_size: [window.innerWidth, window.innerHeight],
            stimulus: drawFN,  //stimulus was defined under function drawFN
            choices: "9",
            trial_duration: 5000 // if only choices should be active, leave this empty
        }

        timeline.push(canvasTrial);

        jsPsych.run(timeline);
        
        </script>
  

        // step 2: initiate jsPsych instance and assign to a variable

</body>
</html>
